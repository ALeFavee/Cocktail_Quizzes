function makeIngredientsQ(card, allCards) {
const correct = card.ingredients[Math.floor(Math.random() * card.ingredients.length)];
const wrongs = shuffle(
allCards.filter(c => c.name !== card.name).flatMap(c => c.ingredients).filter(i => !card.ingredients.includes(i))
).slice(0, 3);
return {
typeLabel: "Ingredients",
question: `Which ingredient is in the ${card.name}?`,
subtext: `Category: ${card.cat}`,
correct,
choices: shuffle([correct, ...wrongs]),
explanation: `The ${card.name} contains: ${card.ingredients.join(', ')}`
};
}

function makeGlassQ(card, allCards) {
const correct = card.glass;
const wrongs = shuffle([...new Set(allCards.filter(c=>c.name!==card.name).map(c=>c.glass))].filter(g => g !== correct)).slice(0, 3);
return {
typeLabel: "Glassware",
question: `What glass is the ${card.name} served in?`,
subtext: `Category: ${card.cat}`,
correct,
choices: shuffle([correct, ...wrongs]),
explanation: `The ${card.name} is served in a ${card.glass} glass. Garnish: ${card.garnish}`
};
}

function makeGarnishQ(card, allCards) {
const correct = card.garnish;
const wrongs = shuffle(allCards.filter(c=>c.name!==card.name).map(c=>c.garnish).filter(g => g !== correct)).slice(0, 3);
return {
typeLabel: "Garnish",
question: `What is the garnish for the ${card.name}?`,
subtext: `Category: ${card.cat}`,
correct,
choices: shuffle([correct, ...wrongs]),
explanation: `${card.name} garnish: ${card.garnish}`
};
}

function makeBuildQ(card, allCards) {
const correct = card.name;
const wrongs = shuffle(allCards.filter(c=>c.name!==card.name).map(c=>c.name)).slice(0,3);
return {
typeLabel: "Build Method",
question: `Which cocktail is built like this?`,
subtext: card.build,
correct,
choices: shuffle([correct, ...wrongs]),
explanation: `That build method belongs to the ${card.name} (${card.cat})`
};
}

function makeWhichCocktailQ(card, allCards) {
const ingr = card.ingredients[Math.floor(Math.random()*card.ingredients.length)];
const correct = card.name;
const wrongs = shuffle(allCards.filter(c => c.name !== card.name && !c.ingredients.includes(ingr)).map(c => c.name)).slice(0, 3);
return {
typeLabel: "Name That Cocktail",
question: `Which cocktail contains "${ingr}"?`,
subtext: `Category: ${card.cat}`,
correct,
choices: shuffle([correct, ...wrongs]),
explanation: `${ingr} is found in the ${card.name}`
};
}

let mode = 'ingredients';
let selectedCat = 'All';
let questions = [], idx = 0, right = 0, wrong = 0, answered = false;

// Build category buttons dynamically
const CATS = ['All', ...([...new Set(CARDS.map(c => c.cat))])];
const catRow = document.getElementById('catRow');
CATS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat === 'All' ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => setCat(cat);
  catRow.appendChild(btn);
});

function setCat(cat) {
  selectedCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
  restart();
}

function setMode(m) {
mode = m;
document.querySelectorAll('.mode-btn').forEach((b,i) => {
b.classList.toggle('active', ['ingredients','glass','build','mix'][i] === m);
});
restart();
}

function shuffle(arr) {
const a=[...arr];
for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
return a;
}

function buildQuestions() {
const pool = selectedCat === 'All' ? CARDS : CARDS.filter(c => c.cat === selectedCat);
const deck = shuffle([...pool]);
return deck.map(card => {
if (mode === 'ingredients') {
return Math.random() < 0.5 ? makeIngredientsQ(card, CARDS) : makeWhichCocktailQ(card, CARDS);
} else if (mode === 'glass') {
return Math.random() < 0.5 ? makeGlassQ(card, CARDS) : makeGarnishQ(card, CARDS);
} else if (mode === 'build') {
return makeBuildQ(card, CARDS);
} else {
const fns = [makeIngredientsQ, makeWhichCocktailQ, makeGlassQ, makeGarnishQ, makeBuildQ];
return fns[Math.floor(Math.random()*fns.length)](card, CARDS);
}
});
}

function start() {
questions = buildQuestions();
idx = 0; right = 0; wrong = 0; answered = false;
document.getElementById('completeScreen').style.display = 'none';
document.getElementById('qCard').style.display = 'block';
document.getElementById('choices').style.display = 'flex';
document.getElementById('scoreStrip').style.display = 'flex';
document.getElementById('feedback').className = 'feedback';
document.getElementById('btnNext').style.display = 'none';
render();
}

function render() {
if (idx >= questions.length) { showComplete(); return; }
const q = questions[idx];
answered = false;
document.getElementById('feedback').className = 'feedback';
document.getElementById('btnNext').style.display = 'none';
document.getElementById('qTypeLabel').textContent = q.typeLabel;
document.getElementById('qText').textContent = q.question;
document.getElementById('qSubtext').textContent = q.subtext;

const letters = ['A','B','C','D'];
const choicesEl = document.getElementById('choices');
choicesEl.innerHTML = '';
q.choices.forEach((choice, i) => {
const btn = document.createElement('button');
btn.className = 'choice';
btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${choice}</span>`;
btn.onclick = () => selectAnswer(choice, q);
choicesEl.appendChild(btn);
});

document.getElementById('prog').style.width = (idx / questions.length * 100) + '%';
document.getElementById('progLabel').textContent = `${idx+1} of ${questions.length}`;
document.getElementById('cNum').textContent = idx+1;
document.getElementById('cRight').textContent = right;
document.getElementById('cWrong').textContent = wrong;
}

function selectAnswer(chosen, q) {
if (answered) return;
answered = true;
const isCorrect = chosen === q.correct;
if (isCorrect) right++; else wrong++;

document.querySelectorAll('.choice').forEach(btn => {
btn.disabled = true;
const label = btn.querySelector('span:last-child').textContent;
if (label === q.correct) btn.classList.add(isCorrect ? 'correct' : 'reveal-correct');
else if (label === chosen && !isCorrect) btn.classList.add('wrong');
});

const fb = document.getElementById('feedback');
fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
fb.textContent = isCorrect ? `✓ Correct! ${q.explanation}` : `✗ The answer is: ${q.correct}. ${q.explanation}`;

document.getElementById('btnNext').style.display = 'block';
document.getElementById('cRight').textContent = right;
document.getElementById('cWrong').textContent = wrong;
}

function next() { idx++; render(); }

function showComplete() {
document.getElementById('qCard').style.display = 'none';
document.getElementById('choices').style.display = 'none';
document.getElementById('btnNext').style.display = 'none';
document.getElementById('feedback').className = 'feedback';
document.getElementById('scoreStrip').style.display = 'none';
document.getElementById('prog').style.width = '100%';
document.getElementById('progLabel').textContent = 'Complete!';

const total = right + wrong;
const pct = total ? Math.round(right / total * 100) : 0;
document.getElementById('bigPct').textContent = pct + '%';
const title = pct >= 90 ? "You're Ready 🍸" : pct >= 70 ? "Almost There" : "Keep Grinding";
document.getElementById('completeTitle').textContent = title;
document.getElementById('completeMsg').textContent = `${right} correct · ${wrong} wrong out of ${total} questions`;
document.getElementById('completeScreen').style.display = 'flex';
}

function restart() { start(); }
start();
</script>
</body>
</html>
