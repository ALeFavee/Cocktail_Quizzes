<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastro's — Build the Drink</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8cc7a;
  --dark: #0d0d0d;
  --dark2: #161616;
  --dark3: #1e1e1e;
  --dark4: #252525;
  --text: #f0ead8;
  --muted: #887a60;
  --green: #4caf70;
  --red: #c95a4c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 60px;
}

.brand {
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 4px;
  text-align: center;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 400;
  text-align: center;
  margin-bottom: 6px;
}
.subtitle {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 22px;
  line-height: 1.8;
}

.section-label {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 8px;
}
.cat-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 560px;
  margin-bottom: 22px;
}
.cat-btn {
  padding: 5px 11px;
  border-radius: 2px;
  font-size: 9px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: var(--muted);
  font-family: 'Montserrat', sans-serif;
  transition: all 0.15s;
}
.cat-btn:hover { border-color: rgba(201,168,76,0.3); color: var(--text); }
.cat-btn.active {
  background: rgba(201,168,76,0.12);
  color: var(--gold);
  border-color: rgba(201,168,76,0.5);
}

.progress-wrap {
  width: 100%;
  max-width: 540px;
  margin-bottom: 6px;
  background: #222;
  height: 2px;
  border-radius: 2px;
}
.progress-fill {
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 2px;
  transition: width 0.4s ease;
}
.progress-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 18px;
}

.cocktail-card {
  width: 100%;
  max-width: 540px;
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 3px;
  padding: 20px 24px;
  margin-bottom: 16px;
  text-align: center;
}
.cocktail-cat-label {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.cocktail-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 10px;
  line-height: 1.2;
}
.remaining-badge {
  display: inline-block;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 20px;
  padding: 3px 12px;
}
.remaining-badge span { color: var(--gold); font-weight: 600; }

.selected-tray {
  width: 100%;
  max-width: 540px;
  min-height: 44px;
  margin-bottom: 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: flex-start;
}
.tray-chip {
  padding: 5px 12px;
  border-radius: 2px;
  font-size: 11px;
  line-height: 1.4;
  animation: popIn 0.2s ease;
}
@keyframes popIn {
  from { transform: scale(0.8); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.tray-chip.correct-chip {
  background: rgba(76,175,112,0.15);
  border: 1px solid rgba(76,175,112,0.4);
  color: #a0e8b0;
}
.tray-chip.wrong-chip {
  background: rgba(201,90,76,0.15);
  border: 1px solid rgba(201,90,76,0.4);
  color: #e8a0a0;
}

.instruction {
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 14px;
  min-height: 16px;
}

.chip-pool {
  width: 100%;
  max-width: 540px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
  justify-content: center;
}
.pool-chip {
  padding: 10px 16px;
  border-radius: 2px;
  border: 1px solid rgba(201,168,76,0.18);
  background: var(--dark3);
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  line-height: 1.4;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  text-align: center;
}
.pool-chip:hover:not(.used) {
  border-color: rgba(201,168,76,0.5);
  background: rgba(201,168,76,0.07);
  transform: translateY(-2px);
}
.pool-chip.flash-correct {
  border-color: var(--green);
  background: rgba(76,175,112,0.15);
  color: #a0e8b0;
  pointer-events: none;
}
.pool-chip.flash-wrong {
  border-color: var(--red);
  background: rgba(201,90,76,0.15);
  color: #e8a0a0;
  animation: shake 0.4s ease;
  pointer-events: none;
}
.pool-chip.used {
  opacity: 0.15;
  pointer-events: none;
  cursor: default;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-5px)}
  40%{transform:translateX(5px)}
  60%{transform:translateX(-3px)}
  80%{transform:translateX(3px)}
}

.score-strip {
  display: flex;
  gap: 20px;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 20px;
}
.score-strip b { color: var(--text); font-weight: 600; }

.btn-skip {
  padding: 10px 28px;
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 2px;
  background: transparent;
  color: var(--muted);
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  margin-bottom: 20px;
  transition: all 0.15s;
}
.btn-skip:hover { border-color: rgba(201,168,76,0.4); color: var(--text); }

/* COMPLETE */
#completeScreen {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  width: 100%;
  max-width: 560px;
}
.big-pct {
  font-family: 'Cormorant Garamond', serif;
  font-size: 88px;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 4px;
}
#completeScreen h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 8px;
}
#completeScreen p {
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 1px;
  line-height: 1.8;
  margin-bottom: 28px;
}
.complete-btns {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 36px;
}
.btn-again {
  padding: 14px 28px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--dark);
  border: none;
  border-radius: 2px;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 600;
  cursor: pointer;
}
.btn-review {
  padding: 14px 28px;
  background: transparent;
  color: var(--gold);
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 2px;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 600;
  cursor: pointer;
}

/* REVIEW */
#reviewSection {
  display: none;
  width: 100%;
  max-width: 560px;
  text-align: left;
}
.review-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 400;
  text-align: center;
  margin-bottom: 6px;
}
.review-sub {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 24px;
}
.review-card {
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 3px;
  padding: 18px 20px;
  margin-bottom: 12px;
}
.review-card.perfect { border-color: rgba(76,175,112,0.3); }
.review-card.missed  { border-color: rgba(201,90,76,0.25); }
.review-cocktail-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 4px;
}
.review-cocktail-cat {
  font-size: 8px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.review-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 8px;
  font-size: 11px;
  line-height: 1.5;
}
.review-row:last-child { margin-bottom: 0; }
.review-dot {
  min-width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 4px;
  flex-shrink: 0;
}
.review-dot.ok  { background: var(--green); }
.review-dot.bad { background: var(--red); }
.review-ingr { color: var(--text); }
.review-status-ok  { color: #4caf70; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }
.review-status-bad { color: #c95a4c; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }
.review-wrong-picked { font-size: 10px; color: var(--muted); margin-top: 2px; }
.btn-back-top {
  display: block;
  margin: 24px auto 0;
  padding: 13px 32px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--dark);
  border: none;
  border-radius: 2px;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 600;
  cursor: pointer;
}

/* TOAST */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,0.3);
  padding: 10px 22px;
  border-radius: 2px;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: transform 0.3s ease;
  z-index: 100;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.t-correct { border-color: rgba(76,175,112,0.5); color: #a0e8b0; }
.toast.t-wrong   { border-color: rgba(201,90,76,0.5);  color: #e8a0a0; }
.toast.t-done    { border-color: rgba(201,168,76,0.5); color: var(--gold); }
</style>
</head>
<body>

<div class="brand">Mastro's Restaurants · 2026</div>
<h1>Build the Drink</h1>
<div class="subtitle">Tap every ingredient & garnish that belongs to the cocktail shown</div>

<div class="section-label">Filter by Spirit</div>
<div class="cat-row" id="catRow"></div>

<div class="progress-wrap"><div class="progress-fill" id="prog"></div></div>
<div class="progress-label" id="progLabel"></div>

<div id="gameArea" style="width:100%;max-width:540px;display:flex;flex-direction:column;align-items:center;">
  <div class="cocktail-card">
    <div class="cocktail-cat-label" id="qCat"></div>
    <div class="cocktail-title" id="qName"></div>
    <div class="remaining-badge">Find <span id="remaining">—</span> more</div>
  </div>

  <div class="selected-tray" id="selectedTray"></div>
  <div class="instruction" id="instruction">Tap all ingredients &amp; garnish below</div>
  <div class="chip-pool" id="chipPool"></div>

  <div class="score-strip">
    <span>✓ <b style="color:#4caf70" id="sCorrect">0</b></span>
    <span>✗ <b style="color:#c95a4c" id="sWrong">0</b></span>
    <span>Cocktail <b id="sCard">1</b> of <b id="sTotal">—</b></span>
  </div>
  <button class="btn-skip" onclick="skipCocktail()">Skip →</button>
</div>

<div id="completeScreen">
  <div class="big-pct" id="bigPct"></div>
  <h2 id="completeTitle"></h2>
  <p id="completeMsg"></p>
  <div class="complete-btns">
    <button class="btn-again" onclick="restart()">Play Again</button>
    <button class="btn-review" onclick="showReview()">Review Results</button>
  </div>
</div>

<div id="reviewSection">
  <div class="review-title">Review</div>
  <div class="review-sub">How you did on each cocktail</div>
  <div id="reviewCards"></div>
  <button class="btn-back-top" onclick="backToComplete()">← Back</button>
</div>

<div class="toast" id="toast"></div>

  {cat:"Non-Alcoholic",name:"Prickly Pear Margarita (NA)",ingredients:["2.5oz Lyre's Agave Blanco Spirit","1oz REAL Prickly Pear Purée",".5oz lemon juice",".5oz lime juice"],garnish:"Maldon Sea salt rim, lime wheel on rim"},
  {cat:"Non-Alcoholic",name:"No Side Sipping",ingredients:["2oz Lyre's Dry London Gin","2oz With CO Cocktails – Ginger Mule"],garnish:"Bamboo pick w/ candied ginger & mint sprig"},
  {cat:"Non-Alcoholic",name:"You Mango Me Hot!",ingredients:["2oz Lyre's Agave Blanco Spirit","1oz Monin Mango Purée","1oz lime juice","2 dashes Scrappy's Firewater Tincture"],garnish:"Tajin/Maldon Sea Salt rim, lime wheel & chili threads"},
  {cat:"Non-Alcoholic",name:"NA Mimosa",ingredients:["5oz Lyre's Classico Sparkling","1oz Perricone orange juice"],garnish:"Orange slice"},
  {cat:"Non-Alcoholic",name:"NA Bellini",ingredients:["5oz Lyre's Classico Sparkling",".5oz Monin Peach Purée"],garnish:"Strawberry"},
  {cat:"Still Spec",name:"Trial & Error",ingredients:["8 rosemary needles","2oz Crystal Head Vodka","1oz Giffard Banane du Brésil","1oz Liber & Co Pineapple Gum Syrup","1oz lemon juice"],garnish:"Long sprig of rosemary"},
  {cat:"Still Spec",name:"Purple Mist",ingredients:["2oz Grey Goose Le Citron Vodka","1oz Monin Ube Syrup",".5oz lemon juice","1oz Collet Brut Rosé Champagne"],garnish:"Edible flower"},
  {cat:"Still Spec",name:"Elyxir 27 Sangria",ingredients:["1oz Absolut Elyx","1oz Fonseca Bin 27 Port",".5oz St-Germain Elderflower Liqueur",".5oz Daily's Simple Syrup",".5oz lemon juice"],garnish:"Dried orange wheel"},
  {cat:"Still Spec",name:"South of France",ingredients:[".5oz Combier Liqueur de Pamplemousse",".5oz Citrónge",".25oz Daily's Simple Syrup"],garnish:"Grapefruit zest"},
  {cat:"Still Spec",name:"Perfect Pear-ing",ingredients:["2oz Botanist Gin","1oz Italicus Rosolio Di Bergamotto","1oz REAL Prickly Pear Purée","1oz lemon juice"],garnish:"Sage"},
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function chipId(text) {
  return 'chip-' + btoa(encodeURIComponent(text)).replace(/[^a-zA-Z0-9]/g,'').slice(0,24);
}

let selectedCat = 'All';
let deck = [], idx = 0;
let totalCorrect = 0, totalWrong = 0;
let currentTargets = [], foundSoFar = [], wrongPickedThisCard = [];
let reviewData = [];
let cardDone = false;

const CATS = ['All', ...[...new Set(CARDS.map(c => c.cat))]];
const catRow = document.getElementById('catRow');
CATS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat==='All' ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => setCat(cat);
  catRow.appendChild(btn);
});

function setCat(cat) {
  selectedCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.textContent===cat));
  restart();
}
function getPool() {
  return selectedCat==='All' ? CARDS : CARDS.filter(c => c.cat===selectedCat);
}

function restart() {
  deck = shuffle(getPool());
  idx = 0; totalCorrect = 0; totalWrong = 0; reviewData = [];
  document.getElementById('completeScreen').style.display = 'none';
  document.getElementById('reviewSection').style.display = 'none';
  document.getElementById('gameArea').style.display = 'flex';
  document.getElementById('sTotal').textContent = deck.length;
  loadCard();
}

function loadCard() {
  if (idx >= deck.length) { showComplete(); return; }
  const card = deck[idx];
  foundSoFar = []; wrongPickedThisCard = []; cardDone = false;
  currentTargets = [...card.ingredients, card.garnish];

  // Decoys from other cards
  const decoys = shuffle(
    CARDS.filter(c => c.name !== card.name)
      .flatMap(c => [...c.ingredients, c.garnish])
      .filter(i => !currentTargets.includes(i))
  ).slice(0, Math.max(10, currentTargets.length * 2));

  const poolItems = shuffle([...currentTargets, ...decoys]);

  document.getElementById('qCat').textContent = card.cat;
  document.getElementById('qName').textContent = card.name;
  updateRemaining();
  document.getElementById('selectedTray').innerHTML = '';
  document.getElementById('instruction').innerHTML = 'Tap all ingredients &amp; garnish below';

  const pool = document.getElementById('chipPool');
  pool.innerHTML = '';
  poolItems.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'pool-chip';
    chip.id = chipId(item);
    chip.textContent = item;
    chip.onclick = () => onChipClick(item, chip, card);
    pool.appendChild(chip);
  });

  document.getElementById('prog').style.width = (idx / deck.length * 100) + '%';
  document.getElementById('progLabel').textContent = `${idx+1} of ${deck.length}`;
  document.getElementById('sCard').textContent = idx+1;
  document.getElementById('sCorrect').textContent = totalCorrect;
  document.getElementById('sWrong').textContent = totalWrong;
}

function updateRemaining() {
  document.getElementById('remaining').textContent = currentTargets.length - foundSoFar.length;
}

function onChipClick(item, chip, card) {
  if (cardDone) return;
  const isCorrect = currentTargets.includes(item) && !foundSoFar.includes(item);

  if (isCorrect) {
    foundSoFar.push(item);
    totalCorrect++;
    chip.classList.add('flash-correct');
    setTimeout(() => chip.classList.add('used'), 350);
    addTrayChip(item, true);
    updateRemaining();
    document.getElementById('sCorrect').textContent = totalCorrect;
    if (foundSoFar.length === currentTargets.length) {
      showToast('Perfect! 🍸', 't-done');
      saveReview(card, true, false);
      cardDone = true;
      setTimeout(advanceCard, 900);
    }
  } else {
    totalWrong++;
    wrongPickedThisCard.push(item);
    chip.classList.add('flash-wrong');
    setTimeout(() => { chip.classList.remove('flash-wrong'); chip.classList.add('used'); }, 600);
    addTrayChip(item, false);
    document.getElementById('sWrong').textContent = totalWrong;
    showToast('Wrong — moving on!', 't-wrong');
    saveReview(card, false, false);
    cardDone = true;
    setTimeout(advanceCard, 900);
  }
}

function addTrayChip(item, correct) {
  const tray = document.getElementById('selectedTray');
  const chip = document.createElement('div');
  chip.className = 'tray-chip ' + (correct ? 'correct-chip' : 'wrong-chip');
  chip.textContent = (correct ? '' : '✗ ') + item;
  tray.appendChild(chip);
}

function skipCocktail() {
  if (cardDone) return;
  saveReview(deck[idx], false, true);
  cardDone = true;
  showToast('Skipped', 't-wrong');
  advanceCard();
}

function advanceCard() { idx++; loadCard(); }

function saveReview(card, perfect, skipped) {
  if (reviewData.find(r => r.card.name === card.name)) return;
  reviewData.push({ card, found: [...foundSoFar], wrongPicked: [...wrongPickedThisCard], skipped, perfect });
}

function showComplete() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('prog').style.width = '100%';
  document.getElementById('progLabel').textContent = 'Complete!';
  const total = totalCorrect + totalWrong;
  const pct = total ? Math.round(totalCorrect / total * 100) : 0;
  document.getElementById('bigPct').textContent = pct + '%';
  document.getElementById('completeTitle').textContent = pct >= 90 ? "Shaken & Stirred 🍸" : pct >= 70 ? "Almost There" : "Keep Practicing";
  document.getElementById('completeMsg').textContent = `${totalCorrect} correct · ${totalWrong} wrong across ${deck.length} cocktails`;
  document.getElementById('completeScreen').style.display = 'flex';
}

function showReview() {
  document.getElementById('completeScreen').style.display = 'none';
  document.getElementById('reviewSection').style.display = 'block';
  const container = document.getElementById('reviewCards');
  container.innerHTML = '';

  reviewData.forEach(r => {
    const div = document.createElement('div');
    div.className = 'review-card ' + (r.perfect ? 'perfect' : 'missed');
    let rows = '';
    r.card.ingredients.forEach(ingr => {
      const found = r.found.includes(ingr);
      rows += `<div class="review-row">
        <div class="review-dot ${found?'ok':'bad'}"></div>
        <div>
          <div class="review-ingr">${ingr}</div>
          <div class="${found?'review-status-ok':'review-status-bad'}">${found?'Got it':'Missed'}</div>
        </div>
      </div>`;
    });
    const gFound = r.found.includes(r.card.garnish);
    rows += `<div class="review-row">
      <div class="review-dot ${gFound?'ok':'bad'}"></div>
      <div>
        <div class="review-ingr">🍋 Garnish: ${r.card.garnish}</div>
        <div class="${gFound?'review-status-ok':'review-status-bad'}">${gFound?'Got it':'Missed'}</div>
      </div>
    </div>`;
    if (r.wrongPicked.length > 0) {
      rows += `<div class="review-row">
        <div class="review-dot bad"></div>
        <div>
          <div class="review-ingr" style="color:var(--red)">Wrong picks:</div>
          <div class="review-wrong-picked">${r.wrongPicked.join(', ')}</div>
        </div>
      </div>`;
    }
    if (r.skipped) {
      rows += `<div class="review-row"><div class="review-dot bad"></div><div class="review-ingr" style="color:var(--muted)">Skipped</div></div>`;
    }
    div.innerHTML = `<div class="review-cocktail-cat">${r.card.cat}</div><div class="review-cocktail-name">${r.card.name}</div>${rows}`;
    container.appendChild(div);
  });
}

function backToComplete() {
  document.getElementById('reviewSection').style.display = 'none';
  document.getElementById('completeScreen').style.display = 'flex';
}

let toastTimer = null;
function showToast(msg, cls) {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg; t.className = 'toast ' + cls + ' show';
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

restart();
</script>
</body>
