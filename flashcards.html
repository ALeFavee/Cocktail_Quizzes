<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastro's Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8cc7a;
  --dark: #0d0d0d;
  --dark2: #161616;
  --dark3: #1e1e1e;
  --text: #f0ead8;
  --muted: #887a60;
  --green: #4caf70;
  --red: #c95a4c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 60px;
}
.brand { font-size: 10px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; text-align: center; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 400; text-align: center; margin-bottom: 8px; }
.subtitle { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; text-align: center; margin-bottom: 20px; }

.section-label { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; text-align: center; margin-bottom: 8px; width: 100%; max-width: 560px; }

.cat-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 560px; margin-bottom: 22px; }
.cat-btn { padding: 5px 11px; border-radius: 2px; font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--muted); font-family: 'Montserrat', sans-serif; transition: all 0.15s; }
.cat-btn:hover { border-color: rgba(201,168,76,0.3); color: var(--text); }
.cat-btn.active { background: rgba(201,168,76,0.12); color: var(--gold); border-color: rgba(201,168,76,0.5); }

.progress-wrap { width: 100%; max-width: 520px; background: #222; height: 2px; border-radius: 2px; margin-bottom: 6px; }
.progress-fill { height: 2px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 2px; transition: width 0.4s ease; }
.progress-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-align: center; text-transform: uppercase; margin-bottom: 22px; }

/* FLASHCARD */
.card-scene {
  width: 100%;
  max-width: 520px;
  height: 340px;
  perspective: 1200px;
  cursor: pointer;
  margin-bottom: 14px;
  transition: height 0.3s;
}
.card-scene.tall { height: 440px; }
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
}
.card-scene.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 28px;
  text-align: center;
}
.card-front { background: var(--dark2); border: 1px solid rgba(201,168,76,0.25); }
.card-back {
  background: var(--dark3);
  border: 1px solid rgba(201,168,76,0.15);
  transform: rotateY(180deg);
  justify-content: flex-start;
  align-items: flex-start;
  text-align: left;
  overflow-y: auto;
  padding: 22px 24px;
}
.card-cat { font-size: 9px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 14px; }
.card-name { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 600; line-height: 1.2; margin-bottom: 16px; }
.tap-hint { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: auto; }
.tap-hint span { font-size: 16px; display: block; margin-bottom: 6px; }

.back-section { margin-bottom: 14px; width: 100%; }
.back-label { font-size: 9px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
.back-value { font-size: 13px; line-height: 1.7; color: var(--text); }
.back-value ul { list-style: none; }
.back-value li { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; align-items: flex-start; gap: 8px; }
.back-value li::before { content: '—'; color: var(--gold); font-size: 10px; margin-top: 3px; flex-shrink: 0; }

/* NAV */
.nav-row { display: flex; gap: 10px; width: 100%; max-width: 520px; margin-bottom: 10px; }
.btn-nav { flex: 1; padding: 13px; border-radius: 2px; border: 1px solid rgba(201,168,76,0.25); background: transparent; color: var(--gold); font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.btn-nav:hover { background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.5); }
.btn-nav:disabled { opacity: 0.25; cursor: default; }

/* MARK */
.mark-row { display: flex; gap: 10px; width: 100%; max-width: 520px; margin-bottom: 18px; }
.btn-mark { flex: 1; padding: 12px; border-radius: 2px; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn-mark:hover { opacity: 0.82; }
.btn-got-it { background: rgba(76,175,112,0.15); color: #4caf70; border: 1px solid rgba(76,175,112,0.35); }
.btn-review { background: rgba(201,90,76,0.12); color: #c95a4c; border: 1px solid rgba(201,90,76,0.3); }

/* SCORE */
.score-strip { display: flex; gap: 18px; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 18px; }
.score-strip b { color: var(--text); font-weight: 600; }
.score-strip .g { color: #4caf70; }
.score-strip .r { color: #c95a4c; }

/* REVIEW TOGGLE */
.review-toggle { display: flex; align-items: center; gap: 10px; font-size: 10px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; cursor: pointer; user-select: none; }
.toggle-track { width: 34px; height: 18px; border-radius: 9px; background: #333; position: relative; transition: background 0.2s; flex-shrink: 0; }
.toggle-track.on { background: rgba(201,168,76,0.4); }
.toggle-thumb { width: 12px; height: 12px; border-radius: 50%; background: var(--muted); position: absolute; top: 3px; left: 3px; transition: all 0.2s; }
.toggle-track.on .toggle-thumb { left: 19px; background: var(--gold); }

/* KEYBOARD HINT */
.kb-hint { font-size: 9px; letter-spacing: 1.5px; color: #3a3428; text-transform: uppercase; text-align: center; margin-top: 16px; }

/* COMPLETE */
#completeScreen { display: none; flex-direction: column; align-items: center; text-align: center; max-width: 420px; }
.big-emoji { font-size: 64px; margin-bottom: 12px; }
#completeScreen h2 { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 400; margin-bottom: 10px; }
#completeScreen p { color: var(--muted); font-size: 12px; letter-spacing: 1px; line-height: 1.8; margin-bottom: 6px; }
.review-count { color: var(--red) !important; }
.btn-group { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; justify-content: center; }
.btn-again { padding: 13px 28px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--dark); border: none; border-radius: 2px; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600; cursor: pointer; }
.btn-review-only { padding: 13px 28px; background: transparent; color: var(--red); border: 1px solid rgba(201,90,76,0.4); border-radius: 2px; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="brand">Mastro's Restaurants · 2026</div>
<h1>Cocktail Flashcards</h1>
<div class="subtitle">Tap to flip · Mark your confidence</div>

<div class="section-label">Filter by Spirit</div>
<div class="cat-row" id="catRow"></div>

<div class="progress-wrap"><div class="progress-fill" id="prog"></div></div>
<div class="progress-label" id="progLabel"></div>

<div class="card-scene" id="cardScene" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face card-front">
      <div class="card-cat" id="frontCat"></div>
      <div class="card-name" id="frontName"></div>
      <div class="tap-hint"><span>👆</span>Tap to reveal full recipe</div>
    </div>
    <div class="card-face card-back" id="cardBack"></div>
  </div>
</div>

<div class="nav-row">
  <button class="btn-nav" id="btnPrev" onclick="go(-1)">← Prev</button>
  <button class="btn-nav" id="btnNext" onclick="go(1)">Next →</button>
</div>

<div class="mark-row">
  <button class="btn-mark btn-got-it" onclick="mark('got')">✓ Got It</button>
  <button class="btn-mark btn-review" onclick="mark('review')">✗ Need Review</button>
</div>

<div class="score-strip">
  <span><b id="cNum">—</b> of <b id="cTotal">—</b></span>
  <span>✓ <b class="g" id="cGot">0</b></span>
  <span>✗ <b class="r" id="cReview">0</b></span>
</div>

<div class="review-toggle" onclick="toggleReviewOnly()">
  <div class="toggle-track" id="toggleTrack"><div class="toggle-thumb"></div></div>
  <span id="toggleLabel">Shuffle cards randomly</span>
</div>

<div class="kb-hint">Space = flip · G = got it · R = review · ← → navigate</div>

<div id="completeScreen">
  <div class="big-emoji" id="bigEmoji"></div>
  <h2 id="completeTitle"></h2>
  <p id="completeMsg"></p>
  <p class="review-count" id="completeReview"></p>
  <div class="btn-group">
    <button class="btn-again" onclick="restart(false)">Start Over</button>
    <button class="btn-review-only" id="btnReviewAgain" onclick="restart(true)">Review Missed</button>
  </div>
</div>

  {cat:"Still Spec",name:"Elyxir 27 Sangria",build:"Boston shaker — muddle berries + orange slice, add ice, shake & pour; top w/ Fever-Tree Club Soda",ingredients:["1oz Absolut Elyx","1oz Fonseca Bin 27 Port",".5oz St-Germain Elderflower Liqueur",".5oz Daily's Simple Syrup",".5oz lemon juice"],glass:"Wine",garnish:"Dried orange wheel"},
  {cat:"Still Spec",name:"South of France",build:"Boston shaker — shake & strain, fill w/ 4.5oz Charles Heidsieck Brut Réserve Champagne",ingredients:[".5oz Combier Liqueur de Pamplemousse",".5oz Citrónge",".25oz Daily's Simple Syrup"],glass:"Champagne",garnish:"Grapefruit zest"},
  {cat:"Still Spec",name:"Perfect Pear-ing",build:"Boston shaker — slap 2 sage leaves & drop in, add ingredients, muddle, add ice, shake & strain over fresh ice; top w/ Perricone Lemonade",ingredients:["2oz Botanist Gin","1oz Italicus Rosolio Di Bergamotto","1oz REAL Prickly Pear Purée","1oz lemon juice"],glass:"Pilsner",garnish:"Sage"},
];

let selectedCat = 'All';
let shuffleMode = true;
let deck = [];
let markedReview = new Set();
let markedGot = new Set();
let idx = 0;
let isFlipped = false;

// Build category buttons
const CATS = ['All', ...[...new Set(CARDS.map(c => c.cat))]];
const catRow = document.getElementById('catRow');
CATS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat === 'All' ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => setCat(cat);
  catRow.appendChild(btn);
});

function setCat(cat) {
  selectedCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
  restart(false);
}

function toggleReviewOnly() {
  shuffleMode = !shuffleMode;
  document.getElementById('toggleTrack').classList.toggle('on', shuffleMode);
  document.getElementById('toggleLabel').textContent = shuffleMode ? 'Shuffle cards randomly' : 'Cards in order';
  restart(false);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck(reviewMissedOnly) {
  let pool = selectedCat === 'All' ? CARDS : CARDS.filter(c => c.cat === selectedCat);
  if (reviewMissedOnly && markedReview.size > 0) {
    pool = pool.filter(c => markedReview.has(c.name));
  }
  return shuffleMode ? shuffle(pool) : [...pool];
}

function restart(reviewMissedOnly) {
  if (!reviewMissedOnly) { markedReview = new Set(); markedGot = new Set(); }
  deck = buildDeck(reviewMissedOnly);
  idx = 0;
  isFlipped = false;
  document.getElementById('completeScreen').style.display = 'none';
  document.getElementById('cardScene').style.display = 'block';
  document.querySelector('.nav-row').style.display = 'flex';
  document.querySelector('.mark-row').style.display = 'flex';
  document.querySelector('.score-strip').style.display = 'flex';
  render();
}

function render() {
  if (deck.length === 0) { showComplete(); return; }
  const card = deck[idx];
  isFlipped = false;
  document.getElementById('cardScene').classList.remove('flipped');

  document.getElementById('frontCat').textContent = card.cat;
  document.getElementById('frontName').textContent = card.name;

  document.getElementById('cardBack').innerHTML = `
    <div class="back-section">
      <div class="back-label">Ingredients</div>
      <div class="back-value"><ul>${card.ingredients.map(i => `<li>${i}</li>`).join('')}</ul></div>
    </div>
    <div class="back-section">
      <div class="back-label">Glass</div>
      <div class="back-value">${card.glass}</div>
    </div>
    <div class="back-section">
      <div class="back-label">Garnish</div>
      <div class="back-value">${card.garnish}</div>
    </div>
    <div class="back-section">
      <div class="back-label">Build Method</div>
      <div class="back-value">${card.build}</div>
    </div>
  `;

  document.getElementById('cardScene').classList.toggle('tall', card.ingredients.length > 4);

  const pct = idx / deck.length * 100;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${idx + 1} of ${deck.length}`;
  document.getElementById('cNum').textContent = idx + 1;
  document.getElementById('cTotal').textContent = deck.length;
  document.getElementById('cGot').textContent = markedGot.size;
  document.getElementById('cReview').textContent = markedReview.size;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === deck.length - 1;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardScene').classList.toggle('flipped', isFlipped);
}

function go(dir) {
  const next = idx + dir;
  if (next < 0 || next >= deck.length) return;
  idx = next;
  render();
}

function mark(type) {
  const name = deck[idx].name;
  if (type === 'got') { markedGot.add(name); markedReview.delete(name); }
  else { markedReview.add(name); markedGot.delete(name); }
  document.getElementById('cGot').textContent = markedGot.size;
  document.getElementById('cReview').textContent = markedReview.size;
  if (idx < deck.length - 1) { idx++; render(); }
  else { showComplete(); }
}

function showComplete() {
  document.getElementById('cardScene').style.display = 'none';
  document.querySelector('.nav-row').style.display = 'none';
  document.querySelector('.mark-row').style.display = 'none';
  document.querySelector('.score-strip').style.display = 'none';
  document.getElementById('prog').style.width = '100%';
  document.getElementById('progLabel').textContent = 'Complete!';

  const total = deck.length;
  const got = markedGot.size;
  const review = markedReview.size;
  const pct = total ? Math.round(got / total * 100) : 0;

  document.getElementById('bigEmoji').textContent = pct >= 90 ? '🍸' : pct >= 70 ? '💪' : '📖';
  document.getElementById('completeTitle').textContent = pct >= 90 ? "You're Ready!" : pct >= 70 ? "Almost There" : "Keep Studying";
  document.getElementById('completeMsg').textContent = `${got} known · ${review} flagged · ${total - got - review} unmarked`;
  document.getElementById('completeReview').textContent = review > 0 ? `${review} card${review > 1 ? 's' : ''} still need practice` : '✓ Nothing flagged for review!';
  document.getElementById('btnReviewAgain').style.display = review > 0 ? 'inline-block' : 'none';
  document.getElementById('completeScreen').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  else if (e.key === 'ArrowLeft') go(-1);
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  else if (e.key === 'g' || e.key === 'G') mark('got');
  else if (e.key === 'r' || e.key === 'R') mark('review');
});

restart(false);
</script>
</body>
</html>
